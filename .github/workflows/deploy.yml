name: Deploy to DigitalOcean

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no root@159.65.142.190 << 'EOF'
            cd /srv/jobai
            git pull origin master
            python3 -m venv .venv || true
            . .venv/bin/activate
            pip install -r requirements.txt
            pm2 restart jobai-backend || pm2 start "uvicorn Backend.app:app --host 0.0.0.0 --port 3001" --name jobai-backend
          EOF
